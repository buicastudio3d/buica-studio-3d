<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buica Studio 3D | Em Manutenção</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Fundo com textura sutil */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.15;
            z-index: -1;
        }

        .container {
            padding: 20px;
            max-width: 900px;
            width: 95%;
        }

        /* Estilo da sua imagem */
        .banner-img {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.2);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #f39c12; /* Laranja do Logo */
            margin-bottom: 10px;
        }

        p {
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn-contato {
            display: inline-block;
            padding: 15px 35px;
            background: linear-gradient(90deg, #f39c12, #e67e22);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-contato:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <img src="Gemini_Generated_Image_zhw2n8zhw2n8zhw2.jpg" alt="Buica Studio 3D" class="banner-img">
        
        <h1>Site em Manutenção</h1>
        <div class="loader"></div>
        <p>Estamos preparando nosso catálogo de impressões 3D.</p>

        <a href="https://wa.me/SEUNUMERO" class="btn-contato">Orçamentos via WhatsApp</a>
    </div>

</body>
</html>
