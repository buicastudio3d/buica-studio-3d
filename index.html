<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buica Studio 3D | Links Oficiais</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 0;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.15;
            z-index: -1;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            width: 95%;
        }

        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.2);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.4rem; letter-spacing: 3px; text-transform: uppercase; color: #f39c12; margin-bottom: 30px; }

        .social-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-social {
            width: 100%;
            padding: 18px;
            text-decoration: none;
            color: #ffffff !important;
            font-weight: bold;
            border-radius: 12px;
            text-align: center;
            font-size: 1.1rem;
            transition: 0.3s;
            display: block;
            border: none !important;
        }

        .btn-social:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        /* CORES CORRIGIDAS */
        #btn-youtube   { background-color: #ff0000 !important; }
        
        #btn-tiktok    { background-color: #ff0000 !important; }
        
        #btn-instagram { background-color: #ff0000 !important; }
        
        #btn-drive     { background-color: #ff0000 !important; }
        
        #btn-whatsapp  { background-color: #25d366 !important; margin-top: 10px; }

        .loader {
            width: 25px;
            height: 25px;
            border: 3px solid #333;
            border-top: 3px solid #f39c12;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <img src="Gemini_Generated_Image_zhw2n8zhw2n8zhw2.png" alt="Buica Studio 3D" class="banner-img">
        
        <h1>Links Oficiais</h1>
        <div class="loader"></div>
        
        <div class="social-grid">
            <a href="https://www.youtube.com/@BuicaStudio3D" target="_blank" class="btn-social" id="btn-youtube">YouTube</a>
            
            <a href="https://www.tiktok.com/@buicastudio3d" target="_blank" class="btn-social" id="btn-tiktok">TikTok</a>
            
            <a href="https://www.instagram.com/buicastudio3d/" target="_blank" class="btn-social" id="btn-instagram">Instagram</a>
            
            <a href="https://drive.google.com/drive/folders/1hJlINxgtvum7AkQMFqj4JagBrr9QeV78?usp=sharing" target="_blank" class="btn-social" id="btn-drive">Modelos 3D (Drive)</a>
            
            <a href="https://wa.me/55DDDNÚMERO" target="_blank" class="btn-social" id="btn-whatsapp">WhatsApp / Orçamentos</a>
        </div>
    </div>

</body>
</html>
