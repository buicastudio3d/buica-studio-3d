<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Buica Studio 3D | Em Manutenção</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 0;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.15;
            z-index: -1;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            width: 95%;
        }

        .banner-img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.2);
            margin-bottom: 20px;
        }

        h1 { font-size: 1.4rem; letter-spacing: 3px; text-transform: uppercase; color: #f39c12; margin-bottom: 20px; }

        /* Estilo dos Botões das Redes Sociais */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-social:hover { transform: translateY(-3px); }

        .youtube { background: #c4302b; }
        .tiktok { background: #010101; border: 1px solid #ff0050; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .drive { background: #1e8e3e; }
        .whatsapp { background: #25d366; grid-column: 1 / -1; margin-top: 10px; } /* Botão de destaque */

        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
