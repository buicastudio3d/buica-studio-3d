<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buica Studio 3D | Em Manutenção</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Fundo com efeito de colmeia/hexágono sutil */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.2;
            z-index: -1;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        .logo-placeholder {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f39c12 0%, #3498db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #ecf0f1;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        p {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 30px;
        }

        .loader {
            border: 4px solid #333;
            border-top: 4px solid #f39c12;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .social-link {
            display: inline-block;
            padding: 12px 25px;
            background: transparent;
            border: 2px solid #3498db;
            color: #3498db;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .social-link:hover {
            background: #3498db;
            color: #fff;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.4);
        }

        .footer-note {
            position: absolute;
            bottom: 30px;
            width: 100%;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">BUICA</div>
        <h1>Studio 3D</h1>
        
        <div class="loader"></div>
        
        <p>Estamos calibrando nossas máquinas e modelando algo incrível para você. <br> Voltamos em breve!</p>


    </div>

    <div class="footer-note">
        &copy; 2026 Buica Studio 3D - Impressão e Modelagem de Alta Precisão.
    </div>

</body>
</html>
