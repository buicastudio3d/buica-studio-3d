<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://buicastudio3d.etsy.com">
    <title>Buica Studio 3D - Redirecionando...</title>
    
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #f39c12;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        a { color: #f39c12; text-decoration: none; font-weight: bold; }
    </style>

    <script type="text/javascript">
        // Redirecionamento via JS como garantia
        window.location.href = "https://buicastudio3d.etsy.com";
    </script>
</head>
<body>
    <div>
        <div class="loader"></div>
        <p>A carregar a nossa loja na Etsy...</p>
        <p>Se não for redirecionado, <a href="https://buicastudio3d.etsy.com">clique aqui</a>.</p>
    </div>
</body>
</html>
